<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MCA Postgraduate | Software Developer | AI/ML Enthusiast | Creative Editor" />
    <meta name="theme-color" content="#0f172a" id="theme-color-meta" />
    <title>Portfolio - MCA Student | Developer & Creator</title>
    <script>
      (function () {
        var stored = localStorage.getItem('darkMode');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'true' ? true : stored === 'false' ? false : prefersDark;
        var root = document.documentElement;
        if (isDark) {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
        var meta = document.getElementById('theme-color-meta');
        if (meta) {
          meta.setAttribute('content', isDark ? '#0f172a' : '#f8fafc');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
